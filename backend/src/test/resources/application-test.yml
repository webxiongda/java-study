server:
  port: 0

spring:
  datasource:
    url: jdbc:h2:mem:java-study-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true

app:
  content-root: ..
  jwt-secret: test-secret-for-launch-readiness-123456
  jwt-expiration-hours: 1
  cors-allowed-origins: http://localhost:5173
