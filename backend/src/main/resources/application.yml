server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/java_study?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:java_study_root}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  content-root: ${CONTENT_ROOT:..}
  jwt-secret: ${JWT_SECRET:change-this-local-development-secret-at-least-32-chars}
  jwt-expiration-hours: ${JWT_EXPIRATION_HOURS:168}
